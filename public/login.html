<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FoodVille</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gradient-to-br from-orange-500 to-red-500 min-h-screen flex items-center justify-center p-4">
    <div class="card w-full max-w-sm text-center">
        <div class="text-5xl mb-3">🍕</div>
        <h1 class="text-2xl font-bold">FoodVille</h1>
        <p class="text-gray-500 text-sm mb-5">Login to your account</p>
        
        <form onsubmit="handleLogin(event)">
            <div class="input-group"><label>📧 Email</label><input type="email" class="input-field" id="lemail" required></div>
            <div class="input-group"><label>🔒 Password</label><input type="password" class="input-field" id="lpass" required></div>
            <button type="submit" class="btn btn-primary mt-3">🚀 Login</button>
        </form>
        
        <p class="text-sm text-gray-500 mt-4">Don't have account? <a href="/register" class="text-orange-500 font-semibold">Register</a></p>
    </div>

    <script src="/js/config.js"></script>
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('lemail').value;
            const pass = document.getElementById('lpass').value;
            try {
                const data = await apiRequest(API.auth.login, { method: 'POST', body: JSON.stringify({ email, password }) });
                setToken(data.token); setUser(data.user);
                showToast('✅ Login successful!', 'success');
                setTimeout(() => window.location.href = data.user.role === 'admin' ? '/admin' : '/', 500);
            } catch(e) { showToast('❌ ' + e.message, 'error'); }
        }
    </script>
</body>
</html>
