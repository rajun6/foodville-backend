<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodVille - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="mobile-container">
        <div class="app-header">
            <div class="flex justify-between items-center">
                <div><h1 class="text-2xl font-bold">🍕 FoodVille</h1><p class="text-sm opacity-80" id="greeting">Delicious Food</p></div>
                <div class="flex gap-3">
                    <a href="/cart" class="relative text-white text-2xl">🛒<span id="cartBadge" class="badge" style="display:none">0</span></a>
                    <a href="/profile" class="text-white text-2xl">👤</a>
                </div>
            </div>
            <input type="text" class="w-full py-3 px-5 rounded-2xl mt-4 text-gray-800" placeholder="🔍 Search food..." oninput="searchFood(this.value)">
        </div>

        <div class="main-content">
            <div class="flex gap-2 overflow-x-auto pb-2 mb-4" id="catList"></div>
            <div class="grid grid-cols-2 gap-3" id="productList"></div>
        </div>

        <div class="bottom-nav">
            <a href="/" class="active">🏠<span>Home</span></a>
            <a href="/cart">🛒<span>Cart</span></a>
            <a href="/orders">📦<span>Orders</span></a>
            <a href="/profile">👤<span>Profile</span></a>
        </div>
    </div>

    <script src="/js/config.js"></script>
    <script>
        let allProducts = [], selectedCat = null;

        if (isLoggedIn()) {
            const u = getUser();
            document.getElementById('greeting').textContent = 'Hello, ' + u.name.split(' ')[0] + '! 👋';
        } else {
            document.getElementById('greeting').innerHTML = '<a href="/login" class="underline">Login</a>';
        }

        async function init() {
            try {
                const catData = await apiRequest(API.products.categories);
                const cats = catData.categories || [];
                document.getElementById('catList').innerHTML = `
                    <button onclick="filterProducts(null)" class="px-4 py-2 rounded-full text-sm font-medium ${!selectedCat?'bg-orange-500 text-white':'bg-white'}">🍽️ All</button>
                    ${cats.map(c => `<button onclick="filterProducts('${c.slug}')" class="px-4 py-2 rounded-full text-sm font-medium bg-white flex-shrink-0">${c.icon} ${c.name}</button>`).join('')}
                `;
                await filterProducts(null);
                if (isLoggedIn()) updateCartBadge();
            } catch(e) { console.error(e); }
        }

        async function filterProducts(slug) {
            selectedCat = slug;
            document.querySelectorAll('#catList button').forEach(b => b.classList.remove('bg-orange-500','text-white'));
            const url = slug ? `${API.products.all}?category=${slug}` : API.products.all;
            try {
                const data = await apiRequest(url);
                allProducts = data.products || [];
                renderProducts(allProducts);
            } catch(e) {}
        }

        function renderProducts(products) {
            const c = document.getElementById('productList');
            if (!products.length) return c.innerHTML = '<div class="col-span-2 text-center py-10 text-gray-400">No products found</div>';
            c.innerHTML = products.map(p => `
                <div class="bg-white rounded-2xl overflow-hidden shadow cursor-pointer" onclick="showDetail('${p._id}')">
                    <img src="${p.images?.[0] || 'https://placehold.co/300/FF6B35/white?text=🍕'}" class="w-full h-32 object-cover">
                    <div class="p-3">
                        <h4 class="font-semibold text-sm">${p.name}</h4>
                        <p class="text-xs text-gray-500">${p.category?.name||''}</p>
                        <div class="flex justify-between items-center mt-2">
                            <span class="font-bold text-orange-500">₹${p.discountPrice||p.price}</span>
                            ${p.isAvailable ? `<button onclick="event.stopPropagation();addToCart('${p._id}')" class="bg-orange-500 text-white w-7 h-7 rounded-full text-lg">+</button>` : '<span class="text-xs text-red-500">Out</span>'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function addToCart(pid) {
            if (!isLoggedIn()) return window.location.href = '/login';
            try {
                await apiRequest(API.cart.add, { method: 'POST', body: JSON.stringify({ productId: pid, quantity: 1 }) });
                showToast('✅ Added to cart!', 'success');
                updateCartBadge();
            } catch(e) { showToast('❌ '+e.message, 'error'); }
        }

        async function updateCartBadge() {
            try {
                const data = await apiRequest(API.cart.get);
                const count = data.cart?.totalItems || 0;
                const badge = document.getElementById('cartBadge');
                if (count > 0) { badge.style.display = 'block'; badge.textContent = count; }
                else badge.style.display = 'none';
            } catch(e) {}
        }

        function searchFood(q) {
            if (!q) return filterProducts(selectedCat);
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(q.toLowerCase()));
            renderProducts(filtered);
        }

        function showDetail(id) {
            const p = allProducts.find(x => x._id === id);
            if (!p) return;
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.onclick = (e) => { if(e.target===modal) modal.remove(); };
            modal.innerHTML = `
                <div class="modal-content" onclick="event.stopPropagation()">
                    <img src="${p.images?.[0]||'https://placehold.co/400/FF6B35/white?text=🍕'}" class="w-full h-48 object-cover rounded-2xl mb-3">
                    <h3 class="text-xl font-bold">${p.name}</h3>
                    <p class="text-gray-500 text-sm">${p.description||''}</p>
                    <p class="text-2xl font-bold text-orange-500 mt-2">₹${p.discountPrice||p.price}</p>
                    <button onclick="addToCart('${p._id}');this.closest('.modal-overlay').remove()" class="btn btn-primary mt-3">🛒 Add to Cart</button>
                    <button onclick="this.closest('.modal-overlay').remove()" class="btn btn-outline btn-sm mt-2">Close</button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        init();
    </script>
</body>
</html>
