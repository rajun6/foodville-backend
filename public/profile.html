<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - FoodVille</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="mobile-container">
        <div class="app-header flex justify-between items-center"><a href="/" class="text-white text-2xl">←</a><h1 class="text-lg font-bold">👤 Profile</h1><button onclick="logout()" class="text-white text-sm">Logout</button></div>
        <div class="main-content" id="profileContent"></div>
        <div class="bottom-nav">
            <a href="/">🏠<span>Home</span></a>
            <a href="/cart">🛒<span>Cart</span></a>
            <a href="/orders">📦<span>Orders</span></a>
            <a href="/profile" class="active">👤<span>Profile</span></a>
        </div>
    </div>
    <script src="/js/config.js"></script>
    <script>
        if (!isLoggedIn()) window.location.href = '/login';

        async function loadProfile() {
            try {
                const data = await apiRequest(API.auth.profile);
                const u = data.user; setUser(u);
                document.getElementById('profileContent').innerHTML = `
                    <div class="card text-center">
                        <img src="https://ui-avatars.com/api/?name=${u.name}&background=FF6B35&color=fff&size=100" class="w-20 h-20 rounded-full mx-auto">
                        <h3 class="text-xl font-bold mt-2">${u.name}</h3>
                        <p class="text-gray-500 text-sm">${u.email}</p>
                        <p class="text-gray-500 text-sm">📱 ${u.phone}</p>
                    </div>
                    <div class="card">
                        <h3 class="font-bold mb-3">📍 Addresses</h3>
                        ${u.addresses?.length ? u.addresses.map(a => `<div class="bg-gray-50 p-3 rounded-xl mb-2"><p class="font-semibold text-sm">${a.label} ${a.isDefault?'(Default)':''}</p><p class="text-xs text-gray-500">${a.street}, ${a.city}</p></div>`).join('') : '<p class="text-gray-400 text-sm">No addresses</p>'}
                        <button onclick="showAddAddress()" class="btn btn-outline btn-sm mt-2">+ Add Address</button>
                    </div>
                    <button onclick="logout()" class="btn btn-danger btn-sm mt-3">🚪 Logout</button>
                `;
            } catch(e) {}
        }

        async function showAddAddress() {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.onclick = (e) => { if(e.target===modal) modal.remove(); };
            modal.innerHTML = `
                <div class="modal-content" onclick="event.stopPropagation()">
                    <h3 class="font-bold mb-3">📍 Add Address</h3>
                    <form onsubmit="saveAddress(event)">
                        <div class="input-group"><label>Label</label><select class="input-field" name="label"><option>Home</option><option>Office</option><option>Other</option></select></div>
                        <div class="input-group"><label>Street *</label><input class="input-field" name="street" required></div>
                        <div class="input-group"><label>City *</label><input class="input-field" name="city" required></div>
                        <div class="input-group"><label>Area</label><input class="input-field" name="area"></div>
                        <label class="flex items-center gap-2 mb-3"><input type="checkbox" name="isDefault"> Set as default</label>
                        <button type="submit" class="btn btn-primary">💾 Save</button>
                    </form>
                </div>
            `;
            document.body.appendChild(modal);
        }

        async function saveAddress(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = { label: fd.get('label'), street: fd.get('street'), city: fd.get('city'), area: fd.get('area'), isDefault: fd.get('isDefault')==='on' };
            try {
                await apiRequest(API.auth.address, { method: 'POST', body: JSON.stringify(data) });
                document.querySelector('.modal-overlay').remove();
                loadProfile();
                showToast('✅ Address added!', 'success');
            } catch(e) { showToast('❌ '+e.message, 'error'); }
        }

        loadProfile();
    </script>
</body>
</html>
